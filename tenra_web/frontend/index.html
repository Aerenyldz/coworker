<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenra Live — AI Pet Agent</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <div class="logo-container">
                    <div class="logo">T</div>
                    <h2>TENRA <span style="font-size:0.6em; color:#888; font-weight:300;">live</span></h2>
                </div>
                <div class="status">
                    <div class="status-dot"></div>
                    Mission Mode
                </div>
            </div>

            <div class="control-panel">
                <label class="toggle-item">
                    <input type="checkbox" id="permission-screen" checked>
                    <span>Canlı ekran paylaşımı</span>
                </label>
                <label class="toggle-item">
                    <input type="checkbox" id="permission-control">
                    <span>Bilgisayar kontrol izni</span>
                </label>
            </div>

            <div class="screen-panel">
                <div class="screen-panel-head">
                    <strong>Canlı ekran önizleme</strong>
                    <span id="screen-status">Bekleniyor...</span>
                </div>
                <img id="screen-preview" alt="Canlı ekran önizlemesi">
            </div>
        </header>
        
        <main class="chat-window" id="chat">
            <div class="message tenra">
                <p>Merhaba. Ben <strong>Tenra Live</strong> 👋</p>
                <p>Ben senin akıllı AI pet yardımcınım: konuşuruz, canlı ekranı görürüm ve sadece <strong>izin verdiğinde</strong> bilgisayarda işlem yaparım.</p>
                <p>Birlikte çözmek istediğin şeyi yaz.</p>
            </div>
        </main>
        
        <footer class="input-area">
            <form class="input-container" id="chat-form">
                <input type="text" id="prompt" placeholder="Ne yapayım? (örn: masaüstündeki dosyaları say)" autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
