<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenra V4 — AI Asistan</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo-container">
                <div class="logo">T</div>
                <h2>TENRA <span style="font-size:0.6em; color:#888; font-weight:300;">v4</span></h2>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                Interpreter Aktif
            </div>
        </header>
        
        <main class="chat-window" id="chat">
            <div class="message tenra">
                <p>Merhaba. Ben <strong>Tenra V4</strong>.</p>
                <p>Artık bilgisayarınızda doğrudan <strong>kod çalıştırabiliyorum</strong>. Dosya silmek, klasör oluşturmak, uygulama açmak, mouse ile kontrol etmek — hepsi yapılabilir.</p>
                <p>Bir görev verin, ben hallederim.</p>
            </div>
        </main>
        
        <footer class="input-area">
            <form class="input-container" id="chat-form">
                <input type="text" id="prompt" placeholder="Ne yapayım? (örn: masaüstündeki dosyaları say)" autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
